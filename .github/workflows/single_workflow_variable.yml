name: Sequential jobs in a single workflow
on:
  push:
    branches:
      - main
jobs:
  Deploying:
    runs-on: ubuntu-latest
    steps:
      - name: display the variable
        run: echo "Hello my name is ${{vars.MY_NAME}}"
      - name: display the secret
        run: echo "Hello my password is ${{secrets.MY_PSSWD}}"
