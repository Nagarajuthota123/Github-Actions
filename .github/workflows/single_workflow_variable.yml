name: demo of environment variables
on: workflow_dispatch
env: 
  WORKFLOW_ENV: workflow-level
jobs:
  env-variable:
    env: 
      JOB_ENV: job-level
    runs-on: ubuntu-latest
    steps:
      - name: knowing the env variable defining on stage
        env: 
          STEP_ENV: Step-level
        run: |
          echo "the variable define at $WORKFLOW_ENV"
          echo "the variable define at $JOB_ENV"
          echo "the variable define at $STEP_ENV"
