name: demo for inputs
on: 
  workflow_dispatch:
    inputs:
      environment: 
        description: choose the environment to deploy 
        required: true 
        default: dev
        type: choice
        options:
          - dev
          - test
          - prod
      ARTIFACT_ID:
        description: choose the artifact version
        required: true
      
jobs:
  input-demo:
    runs-on: ubuntu-latest
    steps:
      - name: deploying the application uses the inputs
        run: echo " the application deploying on ${{inputs.environment}} and the artifact version${{inputs. ARTIFACT_ID}}"
